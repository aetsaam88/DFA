<!DOCTYPE html>
<html>
<head>
    <title>NFA Substring & Pattern Simulator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; padding: 20px; text-align: center; }
        .container { max-width: 950px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-bottom: 5px; }
        select { padding: 12px; width: 85%; border-radius: 8px; border: 2px solid #e67e22; font-size: 16px; margin-bottom: 20px; cursor: pointer; }
        
        .canvas { position: relative; width: 800px; height: 350px; margin: 20px auto; border: 1px solid #ddd; background: #fff; border-radius: 10px; overflow: hidden; }
        .state { 
            width: 55px; height: 55px; border-radius: 50%; border: 3px solid #34495e; 
            position: absolute; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; background: white; z-index: 10; transition: 0.3s;
        }
        .accept { border: 6px double #27ae60; background: #f0fff4; }
        .active { background: #e67e22 !important; color: white; transform: scale(1.1); box-shadow: 0 0 15px #e67e22; }

        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .arrow { stroke: #7f8c8d; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
        .lbl { font-size: 15px; font-weight: bold; fill: #d35400; }

        .ui { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        input { padding: 12px; width: 280px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        .btn { padding: 12px 25px; background: #e67e22; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #d35400; }
        #msg { font-size: 22px; margin-top: 15px; font-weight: bold; min-height: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h2>NFA Pattern Simulator</h2>
    <p>Select a pattern and simulate with 'a' and 'b' strings.</p>
    
    <select id="nfaType" onchange="initVisuals()">
        <option value="subAA">1. Substring 'aa'</option>
        <option value="subBB">2. Substring 'bb'</option>
        <option value="subABA">3. Substring 'aba'</option>
        <option value="subBAB">4. Substring 'bab'</option>
        <option value="aStarB">5. Pattern a*b (0 or more 'a' then 'b')</option>
        <option value="bStarA">6. Pattern b*a (0 or more 'b' then 'a')</option>
        <option value="abOrBa">7. Contains 'ab' OR 'ba'</option>
        <option value="aaOrBb">8. Contains 'aa' OR 'bb'</option>
        <option value="startAendB">9. Starts 'a', ends 'b'</option>
        <option value="startBendA">10. Starts 'b', ends 'a'</option>
    </select>

    <div class="canvas" id="canvas">
        <svg id="svgRoot">
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
                </marker>
            </defs>
        </svg>
        <div id="q0" class="state" style="top:150px; left:80px;">q0</div>
        <div id="q1" class="state" style="top:150px; left:280px;">q1</div>
        <div id="q2" class="state" style="top:150px; left:480px;">q2</div>
        <div id="q3" class="state" style="top:150px; left:680px;">q3</div>
        <div id="q4" class="state" style="top:50px; left:280px; display:none;">q4</div>
        <div id="q5" class="state" style="top:250px; left:280px; display:none;">q5</div>
    </div>

    <div class="ui">
        <input id="inputStr" placeholder="Enter string (e.g., abaa)">
        <button class="btn" onclick="startSim()">Run NFA</button>
    </div>
    <div id="msg"></div>
</div>

<script>
const nfaData = {
    subAA: { acc:['q2'], trans:[{f:'q0',v:'a,b',t:'q0'},{f:'q0',v:'a',t:'q1'},{f:'q1',v:'a',t:'q2'},{f:'q2',v:'a,b',t:'q2'}] },
    subBB: { acc:['q2'], trans:[{f:'q0',v:'a,b',t:'q0'},{f:'q0',v:'b',t:'q1'},{f:'q1',v:'b',t:'q2'},{f:'q2',v:'a,b',t:'q2'}] },
    subABA: { acc:['q3'], trans:[{f:'q0',v:'a,b',t:'q0'},{f:'q0',v:'a',t:'q1'},{f:'q1',v:'b',t:'q2'},{f:'q2',v:'a',t:'q3'},{f:'q3',v:'a,b',t:'q3'}] },
    subBAB: { acc:['q3'], trans:[{f:'q0',v:'a,b',t:'q0'},{f:'q0',v:'b',t:'q1'},{f:'q1',v:'a',t:'q2'},{f:'q2',v:'b',t:'q3'},{f:'q3',v:'a,b',t:'q3'}] },
    aStarB: { acc:['q1'], trans:[{f:'q0',v:'a',t:'q0'},{f:'q0',v:'b',t:'q1'}] },
    bStarA: { acc:['q1'], trans:[{f:'q0',v:'b',t:'q0'},{f:'q0',v:'a',t:'q1'}] },
    abOrBa: { acc:['q3'], trans:[{f:'q0',v:'a,b',t:'q0'},{f:'q0',v:'a',t:'q1'},{f:'q1',v:'b',t:'q3'},{f:'q0',v:'b',t:'q2'},{f:'q2',v:'a',t:'q3'},{f:'q3',v:'a,b',t:'q3'}] },
    aaOrBb: { acc:['q3'], trans:[{f:'q0',v:'a,b',t:'q0'},{f:'q0',v:'a',t:'q1'},{f:'q1',v:'a',t:'q3'},{f:'q0',v:'b',t:'q2'},{f:'q2',v:'b',t:'q3'},{f:'q3',v:'a,b',t:'q3'}] },
    startAendB: { acc:['q2'], trans:[{f:'q0',v:'a',t:'q1'},{f:'q1',v:'a,b',t:'q1'},{f:'q1',v:'b',t:'q2'}] },
    startBendA: { acc:['q2'], trans:[{f:'q0',v:'b',t:'q1'},{f:'q1',v:'a,b',t:'q1'},{f:'q1',v:'a',t:'q2'}] }
};

function initVisuals() {
    const type = document.getElementById('nfaType').value;
    const config = nfaData[type];
    const svg = document.getElementById('svgRoot');
    
    document.querySelectorAll('.state').forEach(s => {
        s.classList.remove('accept', 'active');
        s.style.display = 'none';
        if(config.acc.includes(s.id)) s.classList.add('accept');
    });

    svg.innerHTML = svg.innerHTML.split('</defs>')[0] + '</defs>';
    const used = new Set();
    config.trans.forEach(t => {
        used.add(t.f); used.add(t.t);
        drawLink(t.f, t.t, t.v);
    });
    used.forEach(id => document.getElementById(id).style.display = 'flex');
    document.getElementById('msg').innerText = "NFA Ready";
}

function drawLink(s1, s2, label) {
    const svg = document.getElementById('svgRoot');
    const b1 = document.getElementById(s1), b2 = document.getElementById(s2);
    const x1 = parseInt(b1.style.left)+27, y1 = parseInt(b1.style.top)+27;
    const x2 = parseInt(b2.style.left)+27, y2 = parseInt(b2.style.top)+27;

    if(s1 === s2) { // Loop
        svg.innerHTML += `<path d="M ${x1-15} ${y1-20} Q ${x1} ${y1-75} ${x1+15} ${y1-20}" class="arrow" />
                          <text x="${x1-10}" y="${y1-60}" class="lbl">${label}</text>`;
    } else { // Straight line
        svg.innerHTML += `<path d="M ${x1+25} ${y1} L ${x2-25} ${y2}" class="arrow" />
                          <text x="${(x1+x2)/2}" y="${y1-10}" class="lbl">${label}</text>`;
    }
}

async function startSim() {
    const type = document.getElementById('nfaType').value;
    const input = document.getElementById('inputStr').value.toLowerCase();
    const config = nfaData[type];
    
    let currentSet = new Set(['q0']);
    showActive(currentSet);

    for (let char of input) {
        if (char !== 'a' && char !== 'b') continue;
        await new Promise(r => setTimeout(r, 600));
        
        let nextSet = new Set();
        currentSet.forEach(s => {
            config.trans.forEach(t => {
                if(t.f === s && t.v.includes(char)) nextSet.add(t.t);
            });
        });
        currentSet = nextSet;
        showActive(currentSet);
        if(currentSet.size === 0) break;
    }

    const win = [...currentSet].some(s => config.acc.includes(s));
    const m = document.getElementById('msg');
    m.innerText = win ? "Accepted ✅" : "Rejected ❌";
    m.style.color = win ? "#27ae60" : "#e74c3c";
}

function showActive(set) {
    document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
    set.forEach(id => document.getElementById(id).classList.add('active'));
}

window.onload = initVisuals;
</script>
</body>
</html>
