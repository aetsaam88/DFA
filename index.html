<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Navigation</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        p {
            margin: 10px 0;
        }

        a {
            text-decoration: none;
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
            display: inline-block;
            padding: 10px 25px;
            width: 200px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        /* Hover Effects */
        a:hover {
            background: white;
            color: #764ba2;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        a:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: white; margin-bottom: 20px;">Quick Menu</h2>
        
        <p><a href="index1.html">NFA</a></p>
        <p><a href="index2.html">NFA1</a></p>
        <p><a href="index3.html">NFA2</a></p>
        <p><a href="index4.html">NFA3</a></p>
        <p><a href="index.html">Nfa</a></p>
    </div>

</body>
</html>
