<!DOCTYPE html>
<html>
<head>
<title>DFA Interactive Simulator with Transitions</title>
<style>
body { font-family:'Segoe UI',sans-serif; background:#f8f9fa; padding:20px; text-align:center; }

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

select{
padding:12px;
width:80%;
border-radius:8px;
border:2px solid #3498db;
font-size:16px;
margin-bottom:20px;
}

.canvas-area{
position:relative;
width:700px;
height:350px;
margin:20px auto;
border:1px solid #ddd;
background:white;
border-radius:10px;
}

.state{
width:60px;
height:60px;
border-radius:50%;
border:3px solid #333;
position:absolute;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
background:white;
transition:0.3s;
}

.accept{ border:6px double #27ae60; }

.active{
background:#3498db;
color:white;
transform:scale(1.1);
box-shadow:0 0 15px #3498db;
}

svg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.arrow{
stroke:#3498db;
stroke-width:2;
fill:none;
marker-end:url(#arrowhead);
}

.lbl{
font-size:14px;
font-weight:bold;
fill:#2c3e50;
}

input{
padding:12px;
width:250px;
border:2px solid #ddd;
border-radius:8px;
font-size:16px;
}

.btn{
padding:12px 25px;
background:#3498db;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

#res{
font-size:22px;
margin-top:15px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>DFA Simulator (10 Patterns)</h2>

<select id="dfaSelect" onchange="drawTransitions()">
<option value="endA">1 Ends with 'a'</option>
<option value="endB">2 Ends with 'b'</option>
<option value="startA">3 Starts with 'a'</option>
<option value="startB">4 Starts with 'b'</option>
<option value="evenA">5 Even number of 'a'</option>
<option value="evenB">6 Even number of 'b'</option>
<option value="oddA">7 Odd number of 'a'</option>
<option value="oddB">8 Odd number of 'b'</option>
<option value="subAB">9 Substring 'ab'</option>
<option value="subBA">10 Substring 'ba'</option>
</select>

<div class="canvas-area">
<svg id="svgCanvas">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
<polygon points="0 0,10 3.5,0 7" fill="#3498db"/>
</marker>
</defs>
</svg>

<div id="q0" class="state" style="top:140px; left:80px;">q0</div>
<div id="q1" class="state" style="top:140px; left:320px;">q1</div>
<div id="q2" class="state accept" style="top:140px; left:550px;">q2</div>

</div>

<br>

<input id="strIn" placeholder="Enter string (a/b)">
<button class="btn" onclick="runDFA()">Simulate DFA</button>

<div id="res"></div>

</div>

<script>
// DFA definitions
const dfas = {
endA:{start:'q0', accept:['q1'], trans:{q0:{a:'q1',b:'q0'}, q1:{a:'q1',b:'q0'}}},
endB:{start:'q0', accept:['q1'], trans:{q0:{a:'q0',b:'q1'}, q1:{a:'q0',b:'q1'}}},
startA:{start:'q0', accept:['q1'], trans:{q0:{a:'q1',b:'q2'}, q1:{a:'q1',b:'q1'}, q2:{a:'q2',b:'q2'}}},
startB:{start:'q0', accept:['q1'], trans:{q0:{a:'q2',b:'q1'}, q1:{a:'q1',b:'q1'}, q2:{a:'q2',b:'q2'}}},
evenA:{start:'q0', accept:['q0'], trans:{q0:{a:'q1',b:'q0'}, q1:{a:'q0',b:'q1'}}},
evenB:{start:'q0', accept:['q0'], trans:{q0:{a:'q0',b:'q1'}, q1:{a:'q1',b:'q0'}}},
oddA:{start:'q0', accept:['q1'], trans:{q0:{a:'q1',b:'q0'}, q1:{a:'q0',b:'q1'}}},
oddB:{start:'q0', accept:['q1'], trans:{q0:{a:'q0',b:'q1'}, q1:{a:'q1',b:'q0'}}},
subAB:{start:'q0', accept:['q2'], trans:{q0:{a:'q1',b:'q0'}, q1:{a:'q1',b:'q2'}, q2:{a:'q2',b:'q2'}}},
subBA:{start:'q0', accept:['q2'], trans:{q0:{a:'q0',b:'q1'}, q1:{a:'q2',b:'q1'}, q2:{a:'q2',b:'q2'}}}
};

async function runDFA(){
let input=document.getElementById("strIn").value;
let type=document.getElementById("dfaSelect").value;
let dfa=dfas[type];
let state=dfa.start;
update(state);

for(let ch of input){
if(ch!=='a' && ch!=='b') continue;
await new Promise(r=>setTimeout(r,600));
state=dfa.trans[state][ch];
update(state);
}

let accepted=dfa.accept.includes(state);
let r=document.getElementById("res");
r.innerText=accepted?"Accepted ✅":"Rejected ❌";
r.style.color=accepted?"green":"red";
}

// highlight current state
function update(s){
document.querySelectorAll(".state").forEach(st=>st.classList.remove("active"));
document.getElementById(s).classList.add("active");
}

// draw arrows dynamically
function drawTransitions(){
const type=document.getElementById("dfaSelect").value;
const dfa=dfas[type];
const svg=document.getElementById("svgCanvas");
svg.querySelectorAll("path,label,text").forEach(e=>e.remove());
svg.innerHTML=svg.innerHTML.split("</defs>")[0]+"</defs>";

for(const from in dfa.trans){
for(const sym in dfa.trans[from]){
const to=dfa.trans[from][sym];
drawArrow(from,to,sym);
}
}
}

// helper to draw arrow
function drawArrow(from,to,label){
const svg=document.getElementById("svgCanvas");
const b1=document.getElementById(from), b2=document.getElementById(to);
const x1=parseInt(b1.style.left)+30, y1=parseInt(b1.style.top)+30;
const x2=parseInt(b2.style.left)+30, y2=parseInt(b2.style.top)+30;

if(from===to){
svg.innerHTML+=`<path d="M ${x1-15} ${y1-25} Q ${x1} ${y1-80} ${x1+15} ${y1-25}" class="arrow"/>
<text x="${x1-10}" y="${y1-65}" class="lbl">${label}</text>`;
}else{
svg.innerHTML+=`<path d="M ${x1+30} ${y1} L ${x2-30} ${y2}" class="arrow"/>
<text x="${(x1+x2)/2}" y="${y1-10}" class="lbl">${label}</text>`;
}
}

// draw transitions initially
drawTransitions();
</script>

</body>
</html>
